services:
  agent-mail:
    build: .
    environment:
      HTTP_HOST: "127.0.0.1"
      STORAGE_ROOT: "/data/mailbox"
      LOG_RICH_ENABLED: "true"
      # HTTP_BEARER_TOKEN: "set-in-.env-file"
    # Uncomment to expose externally (requires bearer token + reverse proxy with TLS)
    # ports:
    #   - "127.0.0.1:8765:8765"
    volumes:
      - agent_mail_data:/data
      # Optional: mount a local .env file (read-only) for config
      - ./.env:/app/.env:ro
volumes:
  agent_mail_data:

