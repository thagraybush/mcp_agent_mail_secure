version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_mail
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - pgdata:/var/lib/postgresql/data
  server:
    build: .
    # Uncomment to expose externally (requires bearer token + reverse proxy with TLS)
    # ports:
    #   - "127.0.0.1:8765:8765"
    environment:
      DATABASE_URL: "postgres+asyncpg://agent:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/agent_mail"
      HTTP_BEARER_TOKEN: "${HTTP_BEARER_TOKEN:?Set HTTP_BEARER_TOKEN in .env}"
      STORAGE_ROOT: /data/archive
      TOOL_METRICS_EMIT_ENABLED: "true"
      TOOL_METRICS_EMIT_INTERVAL_SECONDS: "120"
    volumes:
      - archive:/data/archive
    depends_on:
      - db
volumes:
  pgdata:
  archive:
