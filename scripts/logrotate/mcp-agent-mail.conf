# newsyslog.d config for MCP Agent Mail daemon logs.
# Install:
#   1. Replace __HOME__ with your home directory path
#   2. sudo cp scripts/logrotate/mcp-agent-mail.conf /etc/newsyslog.d/
# Immediate shrink: sudo newsyslog -F /etc/newsyslog.d/mcp-agent-mail.conf
#
# logfilename                                          [owner:group]  mode  count  size  when  flags
__HOME__/Library/Logs/mcp-agent-mail.error.log                        644   7      51200 *     J
__HOME__/Library/Logs/mcp-agent-mail.log                              644   7      10240 *     J
